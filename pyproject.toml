[tool.ruff]
line-length = 100
target-version = "py311"
fix = true
unsafe-fixes = false

select = [
  "E",   # pycodestyle errors
  "F",   # pyflakes
  "I",   # isort
  "B",   # flake8-bugbear
  "UP",  # pyupgrade
]

ignore = [
  "E501",  # line length (handled by Black)
]

[tool.ruff.per-file-ignores]
"backend/app/dependencies.py" = ["B008"]
"backend/app/routers/*.py" = ["B008"]


[tool.ruff.isort]
combine-as-imports = true

[tool.black]
line-length = 100
target-version = ["py311"]

[tool.pytest.ini_options]
python_files = ["*_test.py"]